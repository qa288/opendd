services:
  openclaw:
    image: ${OPENDD_IMAGE:-ghcr.io/qa288/opendd:2026.5.7}
    container_name: openclaw-${TENANT_ID}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      OPENCLAW_PUBLIC_URL: https://${TENANT_DOMAIN}
      LARK_MCP_PUBLIC_URL: https://${TENANT_DOMAIN}
      OPENCLAW_HOME: /home/node/.openclaw
      OPENCLAW_PORT: "18789"
      LARK_MCP_LOGIN_HOST: 0.0.0.0
      LARK_MCP_LOGIN_PORT: "31888"
    ports:
      - "${WEB_PORT}:18789"
      - "${OAUTH_PORT}:31888"
    volumes:
      - "${TENANT_DATA_DIR}:/home/node/.openclaw"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 180s
      timeout: 10s
      start_period: 30s
      retries: 3

